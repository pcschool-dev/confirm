<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- ป้องกัน Browser จำหน้าเว็บนี้ -->
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Expires" content="0">
	<title>ระบบรับสมัครนักเรียน @ โรงเรียนปากช่อง | 2569</title>
    <link rel="icon" type="image/x-icon" href="Logo.png">
	<script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script>
	<style>
		iframe {
			position: absolute;
			top: 0px;
			left: 0px;
			width: 100%;
			height: 100%;
			border:none;
		}
		#loading { 
		  position: fixed; 
		  top: 0; 
		  left: 0; 
		  width: 100%; 
		  height: 100VH; 	 
		  z-index: 9999; /* Place loader on top of other content */ 
		} 
		 
		.loader { 
		  margin: auto; 	  
		}
	</style>
</head>
<!-- <body>  -->
<body>
	<div style="display:none;" align="center" id="FBloading" >
		<h4>โปรดเปิดด้วย เบราว์เซอร์ภายนอก <br>Please open in external browser.</h4>	    
    	</div> 
	<div align=center id="loading"
	    style="display:flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">
	    <dotlottie-player src="https://lottie.host/3924723b-b000-47d9-877a-48fc904e0c67/UiIOpIdURz.lottie"
	      background="transparent" speed="1" style="width: 300px; height: 300px" loop autoplay>
	    </dotlottie-player>
	<!-- 
	    <h4 class="fw-bold mb-3" style="text-align: center;" style="color: #333; font-family: 'Sarabun', sans-serif;">
	      <span>กำลังตรวจสอบความปลอดภัย</span>
	    </h4> -->
	  </div>
	
    <iframe style="display:none" id="link"  enctype="multipart/form-data" scrolling="auto"  src="https://script.google.com/macros/s/AKfycby11RiXrIwB--vd9lCCEjvassBHLSzYo6NADhjF2EdtX1cRdGK2Cb0IyP16OEpXtlxgtA/exec"></iframe>
	
    <script type="text/javascript">
        let preloader = document.getElementById("loading");
        let FBloading = document.getElementById("FBloading");
        let link = document.getElementById("link");
        let idUID = window.location.search;
        let param = new URLSearchParams(idUID);
        let id = param.get('fbclid');
        let idApply = param.get('id');
        
        // ฟังก์ชันสร้าง URL ที่ไม่มี Cache (Bypass Cache)
        function getNoCacheUrl(baseUrl, params = "") {
            let sep = baseUrl.includes('?') ? '&' : '?';
            // เติม t=[timestamp] เพื่อให้ URL ไม่ซ้ำกันในแต่ละครั้งที่โหลด
            return baseUrl + params;
        }

        const baseAppScript = "https://script.google.com/macros/s/AKfycby11RiXrIwB--vd9lCCEjvassBHLSzYo6NADhjF2EdtX1cRdGK2Cb0IyP16OEpXtlxgtA/exec";

        if(id){
            // กรณีเปิดจาก Facebook ให้แสดงคำแนะนำ
            preloader.style.display = 'none';
            FBloading.style.display = 'block';
            let countDownDate = new Date(Date.now() + 15000).getTime();   	
            let x = setInterval(function(){
                let now = new Date().getTime();
                let distance = countDownDate - now;                
                let seconds = Math.floor((distance % (1000 * 60)) / 1000);
                if(seconds == 13){
                    FBloading.innerHTML = `<iframe scrolling="auto" src="openExternalBrowser.mp4"></iframe>`
                } else if(seconds <= 0){
                    clearInterval(x);
                    window.location.href = 'https://pcschool-dev.github.io/confirm'
                }  				
            }, 1000);
        
        } else if(idApply){
            // กรณีมี ID สมัครเรียน (โหลดแบบ No Cache)
            preloader.style.display = 'block';
            FBloading.style.display = 'none';
            
            link.src = getNoCacheUrl(baseAppScript, `?id=${idApply}`);
            
            link.onload = function() {
                preloader.style.display = 'none';
                link.style.display = 'block';
            };
        } else {
            // กรณีเข้าหน้าแรกปกติ (โหลดแบบ No Cache)
			 preloader.style.display = 'block';
            link.src = getNoCacheUrl(baseAppScript);
            
            link.onload = function() {
				preloader.style.display = 'none';
				link.style.display = 'block';
            };
        }

        function preLoading(){
            preloader.style.display = 'none';
        };
    </script>
</body>    
</html>
